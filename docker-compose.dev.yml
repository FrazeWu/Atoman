name: atoman-dev

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./server/.env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:16-alpine
    env_file:
      - ./server/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      set -e;
      export PGPASSWORD=$$POSTGRES_PASSWORD;
      if ! psql -h postgres -U $$POSTGRES_USER -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='$$POSTGRES_DB'\" | grep -q 1; then
        createdb -h postgres -U $$POSTGRES_USER -O $$POSTGRES_USER $$POSTGRES_DB;
      fi
      "

  minio:
    image: minio/minio
    ports:
      - "9100:9000"
      - "9101:9001"
    env_file:
      - ./server/.env.dev
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: minio/mc
    env_file:
      - ./server/.env.dev
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc ls myminio/kanye-archive >/dev/null 2>&1 || /usr/bin/mc mb myminio/kanye-archive;
      /usr/bin/mc anonymous set public myminio/kanye-archive;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    env_file:
      - ./server/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
