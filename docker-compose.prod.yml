name: atoman-prod

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./server/.env.prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    env_file:
      - ./server/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      set -e;
      export PGPASSWORD=$$POSTGRES_PASSWORD;
      if ! psql -h postgres -U $$POSTGRES_USER -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='$$POSTGRES_DB'\" | grep -q 1; then
        createdb -h postgres -U $$POSTGRES_USER -O $$POSTGRES_USER $$POSTGRES_DB;
      fi
      "

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
    env_file:
      - ./server/.env.prod
    command: server /data
    volumes:
      - minio-data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./server/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    volumes:
      - upload-data:/app/uploads
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/songs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  upload-data:
